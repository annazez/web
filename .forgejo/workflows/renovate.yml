name: Renovate

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  renovate:
    runs-on: codeberg
    container:
      image: renovate/renovate:43.104.2-full
    env:
      RENOVATE_PLATFORM: forgejo
      RENOVATE_ENDPOINT: https://codeberg.org/api/v1
      RENOVATE_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
      RENOVATE_REPOSITORIES: ${{ github.repository }}
      RENOVATE_GIT_AUTHOR: 'Renovate Bot <anna@zezulka.me>'
      RENOVATE_PR_HOURLY_LIMIT: 0
      RENOVATE_PR_CONCURRENT_LIMIT: 0
      RENOVATE_BRANCH_CONCURRENT_LIMIT: 0
      LOG_LEVEL: info
    steps:
      - name: Run Renovate
        run: renovate
