when:
  - event: [push, pull_request]

steps:
  verify:
    image: node:22.22-alpine3.23
    commands:
      - npm ci
      - npm audit --audit-level=high
      - npm run check
      - npm run typecheck
      - npm run build
  e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    commands:
      - npm ci
      - npx playwright install chromium firefox
      - npm run test:e2e
  performance:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    commands:
      - npm ci
      - npx playwright install chromium
      - npm run build
      - npm run size:check
      - npm run lighthouse:ci
  deploy:
    image: node:22.22-alpine3.23
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache git
      - npm ci
      - npm run deploy
    when:
      - event: push
        branch: main
