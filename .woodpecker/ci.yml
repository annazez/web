when:
  - event: [push, pull_request]

steps:
  build:
    image: node:24.14-alpine3.23
    environment:
      SITE_URL: https://zezulka.me
    commands:
      - npm ci
      - npm run format:check
      - npm run lint
      - npm run typecheck
      - npm run build
  a11y:
    image: node:24.14-alpine3.23
    environment:
      SITE_URL: https://zezulka.me
    commands:
      - npm run test:a11y:ci
  e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    environment:
      SITE_URL: https://zezulka.me
    commands:
      - npm ci
      - npx playwright install chromium firefox
      - npm run test:e2e
  performance:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    environment:
      SITE_URL: https://zezulka.me
    commands:
      - npm ci
      - npx playwright install chromium
      - npm run build
      - npm run size:check
      - npm run lighthouse:ci
  extract-lighthouse:
    image: node:22-alpine
    commands:
      - node --experimental-strip-types scripts/extract-lighthouse.ts
  deploy:
    image: node:24.14-alpine3.23
    environment:
      SITE_URL: https://zezulka.me
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache git
      - npm ci
      - npm run deploy
    when:
      - event: push
        branch: main
