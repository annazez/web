when:
  event: [cron, manual]

steps:
  renovate:
    image: renovate/renovate:43.104.1-full
    environment:
      RENOVATE_PLATFORM: gitea
      RENOVATE_ENDPOINT: https://codeberg.org/api/v1
      RENOVATE_TOKEN:
        from_secret: codeberg_token
      RENOVATE_REPOSITORIES: annazez/pages
      RENOVATE_GIT_AUTHOR: 'Renovate Bot <anna@zezulka.me>'
      LOG_LEVEL: info
    commands:
      - renovate
