when:
  event: [cron, manual]

steps:
  renovate:
    image: renovate/renovate:43.141.5-full
    environment:
      RENOVATE_PLATFORM: forgejo
      RENOVATE_ENDPOINT: https://codeberg.org/api/v1
      RENOVATE_TOKEN:
        from_secret: codeberg_token
      RENOVATE_REPOSITORIES: annazez/pages
      RENOVATE_GIT_AUTHOR: 'Renovate Bot <anna@zezulka.me>'
      RENOVATE_PR_HOURLY_LIMIT: 0
      RENOVATE_PR_CONCURRENT_LIMIT: 0
      RENOVATE_BRANCH_CONCURRENT_LIMIT: 0
      LOG_LEVEL: info
    commands:
      - renovate
